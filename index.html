<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>똔개랑 놀아줘!</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; background-color: #fff9f9;
            padding: 20px; box-sizing: border-box;
        }
        #cat-img { 
            width: 100%; max-width: 400px; height: 350px; 
            object-fit: contain; border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }
        h1 { font-size: 1.5rem; margin-top: 20px; text-align: center; word-break: keep-all; }
        .buttons { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; width: 100%; height: 60px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; transition: all 0.2s; }
        #yesBtn { background-color: #ff9999; color: white; }
        #noBtn { background-color: #e0e0e0; }
    </style>
</head>
<body>

    <h1 id="message">똔개랑 놀아줄 사람???</h1>
    <img id="cat-img" src="https://i.imgur.com/FDT2H1Z.jpeg" alt="똔개">
    
    <div class="buttons">
        <button id="yesBtn" onclick="accept()">똔고양이가 놀아줄게!!</button>
        <button id="noBtn" onclick="shrinkNo()">똔개 혼자 놀아...</button>
    </div>

    <script>
        let count = 0;
        let yesSize = 16;
        let noSize = 16;
        
        const stages = [
            { text: "진짜 안 놀아줄 거야...?", img: "https://i.imgur.com/x4Wn6Yn.jpeg" },
            { text: "진짜로...?", img: "https://i.imgur.com/UfKk9gH.jpeg" },
            { text: "에휴.......", img: "https://i.imgur.com/NlisrYv.jpeg" },
            { text: "똔개 삐졌어.", img: "https://i.imgur.com/my3Z3ik.jpeg" },
            { text: "똔고양이가 안놀아준대요...", img: "https://i.imgur.com/UiHKm69.jpeg" }
        ];

        function accept() {
            document.getElementById('message').innerText = "아싸!!!!!!!!!!";
            document.getElementById('cat-img').src = "https://i.imgur.com/k3tg66e.jpeg";
            document.querySelector('.buttons').style.display = "none";
        }

        function shrinkNo() {
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const img = document.getElementById('cat-img');
            const msg = document.getElementById('message');
            
            // count가 4일 때(5번째 단계) 누르면 6번째 동작이 일어남
            if (count === 4) {
                msg.innerText = "넌 똔개와 놀아줘야만 해.";
                img.src = "https://i.imgur.com/FEMPNOf.jpeg";
                noBtn.style.display = "none"; // 6번째 누름에 즉시 제거
                return;
            }
            
            // 단계 진행
            msg.innerText = stages[count].text;
            img.src = stages[count].img;
            count++;
            
            // 버튼 크기 변화
            yesSize += 6;
            noSize -= 3;
            
            yesBtn.style.fontSize = yesSize + "px";
            yesBtn.style.padding = (12 + count) + "px " + (24 + count * 4) + "px";
            
            noBtn.style.fontSize = Math.max(8, noSize) + "px";
        }
    </script>
</body>
</html>
