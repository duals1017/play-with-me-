<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="parapara.jpeg">
    <meta name="referrer" content="no-referrer">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>똔개랑 놀아줘!</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; background-color: #fff9f9;
            padding: 20px; box-sizing: border-box;
        }
        /* 로고 스타일 */
        #logo { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin-bottom: 10px; }
        
        #cat-img { 
            width: 100%; max-width: 400px; height: 350px; 
            object-fit: contain; border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            background-color: #fff;
        }
        h1 { font-size: 1.5rem; margin-top: 15px; text-align: center; word-break: keep-all; }
        .buttons { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; width: 100%; height: 70px; }
        
        button { 
            padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 12px; 
            font-weight: bold; transition: all 0.2s; 
            color: black !important;
            text-decoration: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        #yesBtn { background-color: #ff9999; color: white !important; }
        #noBtn { background-color: #e0e0e0; color: black !important; }
    </style>
</head>
<body>

    <img id="logo" src="parapara.jpeg" alt="로고">

    <h1 id="message">똔개랑 놀아줄 사람???</h1>
    <img id="cat-img" src="parapara.jpeg" alt="똔개">
    
    <div class="buttons">
        <button id="yesBtn" onclick="accept()">똔고양이가 놀아줄게!!</button>
        <button id="noBtn" onclick="shrinkNo()">똔개 혼자 놀아...</button>
    </div>

    <script>
        let count = 0;
        let yesSize = 16;
        let noSize = 16;
        
        const stages = [
            { text: "진짜 안 놀아줄 거야...?", img: "simuruk.jpeg" },
            { text: "진짜로...?", img: "back.jpeg" },
            { text: "에휴.......", img: "sit.jpeg" },
            { text: "똔개 삐졌어.", img: "sad.jpeg" },
            { text: "똔고양이가 안놀아준대요...", img: "haru.jpg" }
        ];

        function accept() {
            document.getElementById('message').innerText = "아싸!!!!!!!!!!";
            document.getElementById('cat-img').src = "happy.jpg";
            document.querySelector('.buttons').style.display = "none";
        }

        function shrinkNo() {
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const img = document.getElementById('cat-img');
            const msg = document.getElementById('message');
            
            // 6번째 누름 확인 (count가 5가 되는 시점)
            if (count >= 5) {
                msg.innerText = "넌 똔개와 놀아줘야만 해.";
                img.src = "final.jpg";
                noBtn.style.display = "none";
                return;
            }
            
            msg.innerText = stages[count].text;
            img.src = stages[count].img;
            count++;
            
            yesSize += 6;
            noSize -= 3;
            
            yesBtn.style.fontSize = yesSize + "px";
            yesBtn.style.padding = (12 + count) + "px " + (24 + count * 4) + "px";
            
            noBtn.style.fontSize = Math.max(8, noSize) + "px";
        }
    </script>
</body>
</html>
